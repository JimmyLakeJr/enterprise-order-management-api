services:
  postgres:
    image: postgres:16-alpine
    container_name: enterprise-order-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-enterprise_order_management}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-enterprise_order_management}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - enterprise_order_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: enterprise-order-backend-dev
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-.env}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PORT:-8080}:8080"
    networks:
      - enterprise_order_network

volumes:
  postgres_data_dev:

networks:
  enterprise_order_network:
    driver: bridge
