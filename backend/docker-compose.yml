services:
  postgres:
    image: postgres:16-alpine
    container_name: enterprise-order-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - enterprise_order_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: enterprise-order-backend-dev
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-.env}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:${APP_PORT:-8080}"
    networks:
      - enterprise_order_network

volumes:
  postgres_data:

networks:
  enterprise_order_network:
    driver: bridge
