services:
  postgres:
    image: postgres:16-alpine
    container_name: enterprise-order-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: enterprise_order_management
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d enterprise_order_management"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: enterprise-order-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 8080
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/enterprise_order_management?sslmode=disable
      JWT_ACCESS_SECRET: change-this-access-secret
      JWT_REFRESH_SECRET: change-this-refresh-secret
      FRONTEND_URL: http://localhost:5173
      ACCESS_TOKEN_MINUTES: 15
      REFRESH_TOKEN_HOURS: 168
    ports:
      - "8080:8080"

volumes:
  postgres_data:
