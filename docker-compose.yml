services:
  postgres:
    image: postgres:18.3-alpine3.23
    container_name: enterprise-order-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: enterprise_order_management
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d enterprise_order_management"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: enterprise-order-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 8080
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/enterprise_order_management?sslmode=disable
      BACKEND_PUBLIC_URL: http://localhost:8080
      UPLOAD_DIR: /app/uploads
      JWT_ACCESS_SECRET: change-this-access-secret
      JWT_REFRESH_SECRET: change-this-refresh-secret
      FRONTEND_URL: http://localhost:5173
      FRONTEND_AUTH_CALLBACK_URL: http://localhost:5173/auth/google/callback
      GOOGLE_CLIENT_ID: ""
      GOOGLE_CLIENT_SECRET: ""
      GOOGLE_REDIRECT_URL: http://localhost:8080/api/v1/auth/google/callback
      OAUTH_STATE_SECRET: change-this-google-oauth-state-secret
      ACCESS_TOKEN_MINUTES: 15
      REFRESH_TOKEN_HOURS: 168
    ports:
      - "8080:8080"
    volumes:
      - ./uploads:/app/uploads

volumes:
  postgres_data:
