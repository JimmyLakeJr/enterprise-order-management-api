services:
  postgres:
    image: postgres:16-alpine
    container_name: enterprise-order-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-enterprise_order_management}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-enterprise_order_management}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  api:
    build: .
    container_name: enterprise-order-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: ${PORT:-8080}
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-enterprise_order_management}?sslmode=disable
      BACKEND_PUBLIC_URL: ${BACKEND_PUBLIC_URL:-http://localhost:8080}
      UPLOAD_DIR: /app/uploads
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret-change-me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-me}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      FRONTEND_AUTH_CALLBACK_URL: ${FRONTEND_AUTH_CALLBACK_URL:-http://localhost:5173/auth/google/callback}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URL: ${GOOGLE_REDIRECT_URL:-http://localhost:8080/api/v1/auth/google/callback}
      OAUTH_STATE_SECRET: ${OAUTH_STATE_SECRET:-dev-google-oauth-state-secret}
      ACCESS_TOKEN_MINUTES: ${ACCESS_TOKEN_MINUTES:-15}
      REFRESH_TOKEN_HOURS: ${REFRESH_TOKEN_HOURS:-168}
      ZALOPAY_ENABLED: ${ZALOPAY_ENABLED:-false}
      ZALOPAY_ENV: ${ZALOPAY_ENV:-sandbox}
      ZALOPAY_APP_ID: ${ZALOPAY_APP_ID:-}
      ZALOPAY_KEY1: ${ZALOPAY_KEY1:-}
      ZALOPAY_KEY2: ${ZALOPAY_KEY2:-}
      ZALOPAY_CREATE_ORDER_ENDPOINT: ${ZALOPAY_CREATE_ORDER_ENDPOINT:-}
      ZALOPAY_QUERY_ORDER_ENDPOINT: ${ZALOPAY_QUERY_ORDER_ENDPOINT:-}
      ZALOPAY_REFUND_ENDPOINT: ${ZALOPAY_REFUND_ENDPOINT:-}
      ZALOPAY_REDIRECT_URL: ${ZALOPAY_REDIRECT_URL:-http://localhost:5173/payment/zalopay/return}
      ZALOPAY_CALLBACK_URL: ${ZALOPAY_CALLBACK_URL:-http://localhost:8080/api/v1/payments/zalopay/callback}
      ZALOPAY_DEFAULT_BANK_CODE: ${ZALOPAY_DEFAULT_BANK_CODE:-}
      ZALOPAY_CURRENCY: ${ZALOPAY_CURRENCY:-VND}
      ZALOPAY_TIMEOUT_SECONDS: ${ZALOPAY_TIMEOUT_SECONDS:-30}
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - ./uploads:/app/uploads

volumes:
  postgres_data_dev:
